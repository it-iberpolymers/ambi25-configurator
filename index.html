<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propostas Comerciais — Ambiconcept</title>
<meta name="theme-color" content="#006847">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gd:#006847;--g:#6EC43A;--gl:#e8f5e0;--tx:#1a2b22;--mu:#5a7566;--wh:#fff;--off:#f6f9f7;--bd:#e2ebe5;--r:14px;--sh:0 2px 8px rgba(0,0,0,.06);--shh:0 4px 16px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased}
body{font-family:'Poppins',sans-serif;background:var(--off);color:var(--tx);min-height:100vh}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--wh);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.04);gap:10px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo{background:var(--gd);color:var(--g);font-weight:800;font-size:11px;letter-spacing:1.5px;padding:6px 12px;border-radius:8px;text-transform:uppercase}
.hdr-brand{font-size:9px;color:var(--mu);font-weight:500;letter-spacing:2px;text-transform:uppercase}
.hdr-title{font-size:16px;font-weight:700;color:var(--tx)}
.cart-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:2px solid var(--gd);background:var(--wh);color:var(--gd);font:600 13px/1 'Poppins',sans-serif;cursor:pointer;transition:all .2s;position:relative}
.cart-btn:hover{background:var(--gl)}.cart-btn.has{background:var(--gd);color:#fff}
.cart-n{background:var(--g);color:var(--gd);font-size:10px;font-weight:800;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:-6px;right:-6px}

.nav{display:flex;align-items:center;padding:8px 20px;background:var(--wh);border-bottom:1px solid var(--bd);position:sticky;top:52px;z-index:15;font-size:12px;font-weight:500}
.nav-c{color:var(--gd);cursor:pointer;padding:4px 8px;border-radius:6px;display:flex;align-items:center;gap:4px}.nav-c:hover{background:var(--gl)}
.nav-s{color:var(--bd);margin:0 2px}.nav-t{color:var(--mu);padding:4px 8px}

.ct{max-width:960px;margin:0 auto;padding:28px 20px 48px}
.ct-title{font-size:22px;font-weight:800;margin-bottom:4px}
.ct-sub{font-size:13px;color:var(--mu);margin-bottom:24px}
.gama-lbl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gd);font-weight:700;margin:24px 0 10px}
.gama-lbl:first-of-type{margin-top:0}
.prods{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.pc{background:var(--wh);border:2px solid var(--bd);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .2s;box-shadow:var(--sh);text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.pc:hover{border-color:var(--gd);transform:translateY(-2px);box-shadow:var(--shh)}
.pc.feat{border-color:var(--g);background:var(--gl)}
.pc-name{font-size:14px;font-weight:700}.pc-desc{font-size:11px;color:var(--mu);line-height:1.3}
.pc-badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;background:var(--gd);color:#fff;text-transform:uppercase}

.sec{margin-bottom:24px}
.sec-lbl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gd);font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.sec-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--gd);color:#fff;font-size:10px;font-weight:800}
.sec-sub{font-size:12px;color:var(--mu);margin-bottom:12px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:10px 16px;border-radius:10px;border:2px solid var(--bd);background:var(--wh);color:var(--tx);font:500 13px/1 'Poppins',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;box-shadow:var(--sh)}
.chip:hover:not(.off){border-color:var(--gd)}.chip.on{border-color:var(--gd);background:var(--gl);font-weight:600}.chip.off{opacity:.25;cursor:not-allowed}
.chip-sm{font-size:10px;color:var(--mu)}
.w-row{display:flex;flex-direction:column;gap:8px}
.w-btn{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:var(--r);background:var(--wh);border:2px solid var(--bd);cursor:pointer;transition:all .2s;text-align:left;box-shadow:var(--sh)}
.w-btn:hover{border-color:var(--gd)}.w-btn.on{border-color:var(--gd);background:var(--gl)}
.w-name{font-weight:600;font-size:13px}.w-info{font-size:11px;color:var(--mu);margin-top:1px}
.w-chk{margin-left:auto;width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0}.w-chk.on{border:none;background:var(--gd)}
.color-row{display:flex;gap:12px;flex-wrap:wrap}
.clr-w{display:flex;flex-direction:column;align-items:center;gap:5px}
.clr{width:38px;height:38px;border-radius:50%;border:3px solid var(--bd);cursor:pointer;transition:all .2s;box-shadow:0 2px 4px rgba(0,0,0,.1)}
.clr:hover:not(.off){transform:scale(1.1)}.clr.on{border-color:var(--gd);transform:scale(1.15);box-shadow:0 0 0 3px var(--gl)}.clr.off{opacity:.25;cursor:not-allowed}
.clr-l{font-size:9px;color:var(--mu)}.clr-l.on{color:var(--gd);font-weight:700}.clr-l.off{opacity:.35}
.tog-row{display:flex;flex-direction:column;gap:8px}
.tog{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r);border:2px solid var(--bd);background:var(--wh);font:500 12px/1.3 'Poppins',sans-serif;cursor:pointer;transition:all .2s;width:100%;text-align:left;box-shadow:var(--sh)}
.tog:hover{border-color:var(--gd)}.tog.on{border-color:var(--g);background:var(--gl)}
.tog-name{flex:1;font-weight:600}.tog-price{font-size:11px;color:var(--mu)}
.chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0}.chk.on{border:none;background:var(--gd)}
.mode-row{display:flex;gap:8px}
.mc{flex:1;padding:14px;border-radius:var(--r);border:2px solid var(--bd);background:var(--wh);cursor:pointer;transition:all .2s;text-align:center;box-shadow:var(--sh)}
.mc:hover{border-color:var(--gd)}.mc.on{border-color:var(--gd);background:var(--gl)}
.mc-lbl{font-weight:700;font-size:13px}.mc-n{font-size:11px;color:var(--gd);font-weight:600;margin-top:2px}

/* Add to cart bar */
.add-bar{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--wh);border:2px solid var(--gd);border-radius:var(--r);margin-top:24px;box-shadow:var(--shh);flex-wrap:wrap}
.qty-w{display:flex;align-items:center;border:2px solid var(--bd);border-radius:8px;overflow:hidden}
.qty-b{width:36px;height:36px;border:none;background:var(--off);color:var(--tx);font:700 16px/1 'Poppins',sans-serif;cursor:pointer}.qty-b:hover{background:var(--gl);color:var(--gd)}
.qty-v{width:48px;text-align:center;border:none;font:600 14px/1 'Poppins',sans-serif;background:var(--wh)}
.add-info{flex:1;text-align:right;font-size:12px;color:var(--mu)}.add-info b{font-size:18px;color:var(--gd);display:block}
.add-btn{padding:12px 28px;border-radius:10px;border:none;background:var(--gd);color:#fff;font:700 14px/1 'Poppins',sans-serif;cursor:pointer;box-shadow:0 3px 10px rgba(0,104,71,.3);transition:all .2s}
.add-btn:hover{background:#005538;transform:translateY(-1px)}

/* Sum card */
.sum{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-top:16px;box-shadow:var(--sh);border-left:4px solid var(--gd)}
.sum-hd{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gd);font-weight:700;margin-bottom:14px}
.sum-row{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;color:var(--mu);border-bottom:1px solid var(--off);font-weight:500}
.sum-row span:last-child{font-weight:600;color:var(--tx)}
.sum-tot{display:flex;justify-content:space-between;padding-top:14px;margin-top:8px;border-top:2px solid var(--gd);font-size:20px;font-weight:800;color:var(--gd)}
.sum-note{font-size:10px;color:var(--mu);margin-top:10px}

/* Cart / proposal */
.field-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.field{flex:1;min-width:180px}
.field label{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mu);font-weight:600;margin-bottom:4px}
.field input{width:100%;padding:10px 14px;border:2px solid var(--bd);border-radius:8px;font:500 13px/1 'Poppins',sans-serif;color:var(--tx);background:var(--wh)}
.field input:focus{outline:none;border-color:var(--gd)}
.qt{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.qt thead{background:var(--gl)}
.qt th{padding:10px 14px;text-align:left;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gd);border-bottom:2px solid var(--gd)}
.qt th:nth-child(2),.qt th:nth-child(3),.qt th:nth-child(4){text-align:right}
.qt td{padding:10px 14px;border-bottom:1px solid var(--bd)}
.qt td:nth-child(2),.qt td:nth-child(3),.qt td:nth-child(4){text-align:right;font-weight:600}
.qt .cat-r td{font-weight:700;color:var(--gd);background:var(--off);padding-top:14px}
.qt .tot-r td{font-weight:800;font-size:15px;color:var(--gd);border-top:3px solid var(--gd);padding-top:14px}
.rm{color:#dc2626;cursor:pointer;font-size:11px;font-weight:600;border:none;background:none;padding:2px 6px;border-radius:4px}.rm:hover{background:#fee2e2}
.empty{text-align:center;padding:48px 20px;color:var(--mu)}.empty b{font-size:15px;display:block;margin-bottom:4px}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.cta{flex:1;padding:14px;border-radius:12px;border:none;background:var(--gd);color:#fff;font:700 14px/1 'Poppins',sans-serif;cursor:pointer;box-shadow:0 4px 12px rgba(0,104,71,.3);transition:all .2s}.cta:hover{background:#005538}
.print-btn{padding:12px 24px;border-radius:10px;border:2px solid var(--gd);background:var(--wh);color:var(--gd);font:700 13px/1 'Poppins',sans-serif;cursor:pointer}.print-btn:hover{background:var(--gl)}
.back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--wh);color:var(--tx);font:500 12px/1 'Poppins',sans-serif;cursor:pointer;margin-bottom:20px}.back:hover{border-color:var(--gd);background:var(--gl)}
.footer{text-align:center;font-size:10px;color:var(--mu);margin-top:24px;padding-bottom:24px;letter-spacing:1px}
.ic{width:18px;height:18px;flex-shrink:0}



/* ═══ PROPOSAL PRINT TEMPLATE ═══ */
.proposal-doc{display:none}

@media print{
  .hdr,.nav,.back,.cart-btn,.add-bar,.add-btn,.rm,.btn-row,.field,.footer,.no-print,.view-btn,.sum,.sec,.mode-row,.chip-row,.w-row,.tog-row,.color-row,.qty-w,.ct-title,.ct-sub,.gama-lbl,.prods,.add-info{display:none!important}
  body{background:#fff;font-size:11pt;color:#333;font-family:'Poppins',sans-serif;margin:0;padding:0}
  .ct{display:none!important}
  .proposal-doc{display:block!important;max-width:100%;margin:0;padding:0}

  .p-page{page-break-after:always;padding:40px 50px;min-height:100vh;position:relative}
  .p-page:last-child{page-break-after:auto}

  /* Cover */
  .p-cover{display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;gap:20px}
  .p-cover-logo{font-size:28px;font-weight:800;color:#006847;letter-spacing:2px}
  .p-cover-logo span{color:#6EC43A}
  .p-cover-sub{font-size:14px;color:#888;letter-spacing:4px;text-transform:uppercase}
  .p-cover-line{width:80px;height:2px;background:#ccc;margin:20px auto}
  .p-cover-title{font-size:22px;font-weight:300;color:#555}
  .p-cover-ref{font-size:13px;font-weight:700;color:#333}

  /* Header bar on each page */
  .p-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #006847}
  .p-hdr-left{font-size:20px;font-weight:300;color:#bbb;line-height:1.2}
  .p-hdr-right{text-align:right;font-size:8px;color:#aaa;letter-spacing:1px;text-transform:uppercase}

  /* Footer on each page */
  .p-footer{position:absolute;bottom:30px;left:50px;right:50px;display:flex;justify-content:space-between;align-items:flex-end;font-size:8px;color:#999;border-top:1px solid #eee;padding-top:8px}
  .p-footer-logo{font-size:14px;font-weight:800;color:#006847;letter-spacing:1px}
  .p-footer-logo span{color:#6EC43A}

  /* Client box */
  .p-client{margin:20px 0;padding:12px 18px;border:1px solid #ddd;border-radius:4px}
  .p-client-label{font-size:9px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .p-client-val{font-size:13px;font-weight:600;color:#333}
  .p-row{display:flex;gap:20px;margin:16px 0}
  .p-col{flex:1;padding:10px 14px;border:1px solid #eee;border-radius:4px}
  .p-col-label{font-size:9px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .p-col-val{font-size:12px;color:#333}

  /* Section titles */
  .p-h2{font-size:14px;font-weight:700;color:#333;margin:24px 0 8px}
  .p-h3{font-size:12px;font-weight:700;color:#333;margin:16px 0 6px}
  .p-text{font-size:10px;color:#555;line-height:1.6;margin-bottom:8px}

  /* Equipment table */
  .p-equip-banner{background:#c5d9a0;text-align:center;padding:8px;font-size:13px;font-weight:700;color:#555;margin:16px 0 0;border-radius:4px 4px 0 0}
  .p-table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:16px}
  .p-table th{padding:8px 12px;text-align:left;font-weight:700;font-size:9px;color:#888;border-bottom:1px solid #ddd}
  .p-table th:nth-child(2),.p-table th:nth-child(3),.p-table th:nth-child(4){text-align:right}
  .p-table td{padding:7px 12px;border-bottom:1px solid #f0f0f0;color:#555}
  .p-table td:nth-child(2),.p-table td:nth-child(3),.p-table td:nth-child(4){text-align:right}
  .p-table .p-cat td{font-weight:700;color:#555;padding-top:14px;border-bottom:1px solid #ddd}
  .p-table .p-subtotal td{font-weight:700;border-top:2px solid #ddd;padding-top:10px;text-align:right}

  /* Notes */
  .p-notes{font-size:9px;color:#888;margin:16px 0;line-height:1.6}
  .p-notes li{margin-bottom:4px}

  /* Conditions */
  .p-conditions{font-size:9px;color:#555;line-height:1.7}
  .p-conditions p{margin-bottom:8px}
}


/* Image viewer modal */
.img-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);align-items:center;justify-content:center;flex-direction:column;padding:20px}
.img-modal.show{display:flex}
.img-modal img{max-width:100%;max-height:70vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.img-modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.img-modal-close:hover{background:rgba(255,255,255,.15)}
.img-spot{position:absolute;pointer-events:none;border-radius:8px}
.img-wrap{position:relative;display:inline-block}
.img-badges{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:5px}
.img-badge{font-size:10px;font-weight:700;letter-spacing:.8px;padding:4px 10px;border-radius:6px;color:#fff;backdrop-filter:blur(6px);text-transform:uppercase}
.img-badge-g{font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.18);color:#fff;backdrop-filter:blur(6px)}
.view-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;border:2px solid var(--gd);background:var(--wh);color:var(--gd);font:700 14px/1 'Poppins',sans-serif;cursor:pointer;transition:all .2s;margin-top:16px;box-shadow:var(--sh)}
.view-btn:hover{background:var(--gl);transform:translateY(-1px);box-shadow:var(--shh)}
.view-btn svg{width:20px;height:20px}
</style>
</head>

</svg> Imprimir / PDF</button>`;

function doPrint(){
  // Build the full proposal document matching PDF template
  let pdoc=document.getElementById('proposalDoc');
  if(!pdoc){pdoc=document.createElement('div');pdoc.id='proposalDoc';pdoc.className='proposal-doc';document.body.appendChild(pdoc)}

  const today=proposal.date||new Date().toISOString().slice(0,10);
  const dateFormatted=today.split('-').reverse().join(' ');
  const ref=proposal.ref||'PCRU_2026_N___';
  const client=proposal.client||'[Cliente]';
  const contact=proposal.contact||'[Destinatário]';
  const comercial=proposal.comercial||'[Comercial]';

  // Group cart by category
  const groups={};cart.forEach(item=>{if(!groups[item.cat])groups[item.cat]=[];groups[item.cat].push(item)});
  let subtotal=0;cart.forEach(i=>subtotal+=i.price*i.qty);

  // Build table rows
  let tableRows='';
  Object.entries(groups).forEach(([cat,items])=>{
    tableRows+=`<tr class="p-cat"><td colspan="4"><b>${cat}</b></td></tr>`;
    tableRows+=`<tr><td></td><td><b>Valor Unitário</b></td><td><b>Quantidade</b></td><td><b>Valor Total</b></td></tr>`;
    items.forEach(item=>{
      const t=item.price*item.qty;
      tableRows+=`<tr><td>${item.name}</td><td>${fmt(item.price)}</td><td style="text-align:center">${item.qty}</td><td>${fmt(t)}</td></tr>`;
    });
  });

  const hdr=`<div class="p-hdr"><div class="p-hdr-left">PROPOSTA<br>COMERCIAL</div><div class="p-hdr-right">APRESENTAÇÃO DE PROPOSTA AMBICONCEPT<br><br>AMBICONCEPT.PT</div></div>`;
  const ftr=`<div class="p-footer"><div>Para todos os assuntos relacionados com a presente proposta poderá contactar:<br>Telefone: +351 21 193 1020 | E-mail: comercial@ambiconcept.pt</div><div class="p-footer-logo"><span>AMBI</span>CONCEPT<br><span style="font-size:8px;font-weight:400;letter-spacing:3px;color:#888">WASTE SOLUTIONS</span></div></div>`;

  pdoc.innerHTML=`
    <!-- PAGE 1: COVER -->
    <div class="p-page p-cover">
      <div style="margin-top:30vh">
        <div class="p-cover-logo"><span>⌬AMBI</span>CONCEPT</div>
        <div class="p-cover-sub">Waste Solutions</div>
        <div class="p-cover-line"></div>
        <div class="p-cover-title">PROPOSTA COMERCIAL</div>
        <div class="p-cover-ref">${ref} | ${dateFormatted}</div>
      </div>
    </div>

    <!-- PAGE 2: CLIENT + DESCRIPTION -->
    <div class="p-page">
      ${hdr}
      <div class="p-client"><div class="p-client-label">Cliente</div><div class="p-client-val">${client}</div></div>
      <div class="p-row">
        <div class="p-col"><div class="p-col-label">Proponente</div><div class="p-col-val">${comercial}</div></div>
        <div class="p-col"><div class="p-col-label">Destinatário | Cliente</div><div class="p-col-val">A/C ${contact}</div></div>
      </div>

      <div class="p-h2">1. DESCRIÇÃO GERAL</div>
      <div class="p-text">AMBICONCEPT, Tecnologias Ambientais, Lda. é uma empresa portuguesa, especializada no desenvolvimento, produção e comercialização de produtos e soluções destinados à gestão de resíduos.</div>
      <div class="p-text">Somos uma equipa experiente no desenvolvimento e implantação de soluções, indo de encontro a novos desafios e exigências dos nossos Clientes.</div>
      <div class="p-text">A nossa gama de produtos e serviços, tem como compromisso oferecer soluções inovadoras ao mercado, que permitam acompanhar a evolução tecnológica do meio urbano.</div>
      <div class="p-text">Exigir o melhor de nós próprios e elevar os padrões de qualidade dos nossos produtos e serviços são a nossa prioridade, porque acreditamos que só assim conseguimos superar as expectativas dos nossos clientes.</div>

      <div class="p-h3">1.1. PRAZO DE FORNECIMENTO</div>
      <div class="p-text" style="padding-left:20px">Após a adjudicação, até 6 semanas.</div>

      <div class="p-h3">1.2. CONDIÇÕES E PRAZOS DE PAGAMENTO</div>
      <div class="p-text" style="padding-left:20px">Faturação contra entregas.<br>Prazo pagamento: 30 dias</div>
      ${ftr}
    </div>

    <!-- PAGE 3: PROPOSAL TABLE -->
    <div class="p-page">
      ${hdr}
      <div class="p-h3">1.3. CONDIÇÕES DE ENTREGA</div>
      <div class="p-text" style="padding-left:20px">Serviço entrega: Nas instalações do município correspondente.</div>

      <div class="p-h2">2. A NOSSA PROPOSTA COMERCIAL</div>

      <div class="p-equip-banner">Equipamentos</div>
      <table class="p-table">
        <tbody>
          ${tableRows}
          <tr class="p-subtotal"><td colspan="3" style="text-align:right">Sub-total</td><td>${fmt(subtotal)}</td></tr>
        </tbody>
      </table>

      <ul class="p-notes">
        <li>O valor apresentado de transporte não contempla os meios de descarga do camião.</li>
        <li>Esta proposta é válida por 30 dias, a contar da data de envio da mesma.</li>
        <li>Aos preços acima indicados em euros, acresce o IVA à taxa legal em vigor.</li>
      </ul>

      <div class="p-h2">3. CONDIÇÕES GERAIS</div>
      ${ftr}
    </div>

    <!-- PAGE 4: CONDITIONS -->
    <div class="p-page">
      ${hdr}
      <div class="p-conditions">
        <p>A adjudicação da presente proposta por parte do seu destinatário, implica a aceitação integral de todos os seus termos e condições, bem como das cláusulas seguintes:</p>
        <p>a) As presentes condições gerais apresentadas pela Ambiconcept, Lda. são parte integrante do documento a elas anexo, salvo disposição escrita em contrário.</p>
        <p>b) Objeto da Proposta: A presente proposta/contrato tem por objeto o fornecimento de produtos supra especificados por parte da AMBICONCEPT ao seu destinatário.</p>
        <p>c) A Ambiconcept, Lda., na qualidade de fornecedora, é alheia à necessidade de levantamento de licenças municipais, licenças especiais de trabalho na via pública, ou outras do mesmo tipo, sendo esta uma responsabilidade única do Dono de Obra.</p>
        <p>d) Cada item de transporte, incluídos na nossa proposta de fornecimento, contempla um período de uma hora para efeitos de operação de descarga. Sempre que, por motivos alheios à Ambiconcept, Lda. este período seja ultrapassado, na justa medida da respetiva incidência esses custos serão imputados ao Cliente.</p>
        <p>e) O período de garantia por defeitos de fabrico, é de 24 meses seguintes à entrega dos equipamentos a contar da data da fatura. Estão excluídos pelas condições de garantia danos produzidos por sinistros, má utilização, atos de vandalismos, bem como intervenções resultantes do desgaste normal da utilização, nomeadamente: afinações, reparações ou substituições de consumíveis.</p>
        <p>f) A assistência técnica dos equipamentos fornecidos pela Ambiconcept, Lda., é prestada por equipas técnicas especializadas da Ambiconcept, Lda. Apenas estas equipas estão autorizadas a efetuar reparações em garantia dos produtos/equipamentos, pelo que, quaisquer intervenções por parte de terceiros, determinarão a perda de garantia do respetivo produto/equipamento.</p>
        <p>g) Quaisquer atrasos nos pagamentos das faturas da Ambiconcept, Lda., conferem-lhe o direito ao débito de juros de mora à taxa legal em vigor, a liquidar contra apresentação da respetiva nota de debito.</p>
        <p>h) São reconhecidos, que os termos e cláusulas das condições gerais, designadamente os referentes a preços, prazos de produção e condições de pagamento e entrega, consubstanciam informação comercial sensível e relevante para a AMBICONCEPT, comprometendo-se a não utilizar e/ou divulgar a presente proposta/contrato, nem o respetivo teor, exceto se tal se afigurar necessário em sede de um eventual litígio judicial entre as partes.</p>
      </div>
      ${ftr}
    </div>
  `;

  // Small delay then print
  setTimeout(()=>window.print(),100);
}

const POS3={papel:22,vidro:50,embalagens:78};
const POS4={papel:15,vidro:38,embalagens:62,indiferenciados:84};
const WCLR={papel:'#3b7dd8',vidro:'#22c55e',embalagens:'#eab308',indiferenciados:'#888'};

function getImg25(){
  if(S.opts.includes('pilhao'))return{src:IMGS.pilhao,ly:null};
  if(S.color==='residuo')return{src:IMGS.sem,ly:'4'};
  if(S.color==='azul'&&S.argola==='dupla')return{src:IMGS.azul_d,ly:'3'};
  if(S.color==='azul')return{src:IMGS.azul_s,ly:'3'};
  if(S.color==='bronze')return{src:IMGS.bronze,ly:'3'};
  if(S.color==='cinza')return{src:IMGS.cinza,ly:'4'};
  return{src:IMGS.sem,ly:'4'};
}

function showImg25(){
  const{src,ly}=getImg25();
  const modal=document.getElementById('imgModal');
  const img=document.getElementById('imgModalImg');
  const spot=document.getElementById('imgSpot');
  const badges=document.getElementById('imgBadges');

  img.src=src;
  modal.classList.add('show');
  document.body.style.overflow='hidden';

  // Spotlight
  if(ly){
    const pm=ly==='3'?POS3:POS4;
    const sel=S.wastes.filter(w=>pm[w]!=null).map(w=>pm[w]);
    const allP=Object.values(pm);
    if(sel.length<allP.length&&sel.length>0){
      const rw=ly==='3'?20:18;
      const d=Math.min(0.82,(1-sel.length/allP.length)*0.9);
      spot.style.cssText=`position:absolute;inset:0;background:${sel.map(p=>`radial-gradient(ellipse ${rw}% 75% at ${p}% 48%, transparent 0%, rgba(0,0,0,${d}) 100%)`).join(',')};border-radius:8px`;
    } else {
      spot.style.cssText='display:none';
    }
  } else {
    spot.style.cssText='display:none';
  }

  // Badges
  let bh=`<span class="img-badge-g">${CLBL[S.color]||S.color}</span>`;
  S.wastes.forEach(w=>bh+=`<span class="img-badge" style="background:${WCLR[w]||'#888'}dd">${WLBL[w]}</span>`);
  bh+=`<span class="img-badge-g">${S.aro==='integrado'?'Aro Integrado':'Aro Rotomoldado'}</span>`;
  bh+=`<span class="img-badge-g">${S.argola==='simples'?'Argola Simples':'Argola Dupla'}</span>`;
  if(S.opts.length)bh+=`<span class="img-badge-g">${S.opts.map(o=>{const f=O25.find(x=>x.id===o);return f?f.n:o}).join(', ')}</span>`;
  badges.innerHTML=bh;
}

function closeImg(){
  document.getElementById('imgModal').classList.remove('show');
  document.body.style.overflow='';
}

// Escape key closes
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeImg()});
</script>
