<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMBI 2.5 — Configurador | Ambiconcept</title>
<meta name="theme-color" content="#006847">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gd:#006847;--g:#6EC43A;--gl:#e8f5e0;--s:#3D5266;--tx:#1a2b22;--mu:#5a7566;--wh:#ffffff;--off:#f6f9f7;--bd:#e2ebe5;--radius:14px;--shadow:0 2px 8px rgba(0,0,0,0.06);--shadow-hover:0 4px 16px rgba(0,0,0,0.1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;background:var(--off);color:var(--tx);min-height:100vh;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--wh);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,0.04);gap:10px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:12px}
.logo-pill{background:var(--gd);color:var(--g);font-weight:800;font-size:11px;letter-spacing:1.5px;padding:6px 12px;border-radius:8px;text-transform:uppercase}
.header-brand{font-size:9px;color:var(--mu);font-weight:500;letter-spacing:2px;text-transform:uppercase}
.header-model{font-size:16px;font-weight:700;color:var(--tx);letter-spacing:.3px}
.header-right{display:flex;align-items:center;gap:10px}
.lang-sel{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--bd);background:var(--wh)}
.lang-btn{padding:5px 9px;font:600 10px/1 'Poppins',sans-serif;border:none;cursor:pointer;background:transparent;color:var(--mu);transition:all .15s;letter-spacing:.5px}
.lang-btn:hover{background:var(--gl);color:var(--gd)}
.lang-btn.active{background:var(--gd);color:#fff}
.price-box{text-align:right;background:var(--gd);color:#fff;padding:7px 16px;border-radius:10px}
.price-label{font-size:8px;letter-spacing:2px;opacity:.7;font-weight:500}
.price-value{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.price-value span{font-size:13px;font-weight:400;opacity:.7}
.layout{display:flex;flex-direction:column}
.viewer{position:sticky;top:58px;z-index:10;width:100%;background:#0a0a0a;overflow:hidden;border-bottom:3px solid var(--gd);max-height:38vh}
.viewer img{width:100%;display:block;transition:all .4s ease}
.spotlight{position:absolute;inset:0;pointer-events:none;transition:all .5s ease}
.badges{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:5px}
.badge{font-size:10px;font-weight:700;letter-spacing:.8px;padding:4px 10px;border-radius:6px;color:#fff;backdrop-filter:blur(6px);text-transform:uppercase}
.badge-glass{font-size:10px;font-weight:600;letter-spacing:.5px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.18);color:#fff;backdrop-filter:blur(6px)}
.panel{padding:28px 20px 48px;max-width:640px;margin:0 auto;width:100%}
.section{margin-bottom:28px}
.section-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gd);font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.section-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--gd);color:#fff;font-size:10px;font-weight:800;letter-spacing:0}
.section-sub{font-size:12px;color:var(--mu);margin-bottom:14px;font-weight:400}
.ic{width:20px;height:20px;flex-shrink:0}.ic-lg{width:24px;height:24px}

/* Mode selector */
.mode-group{display:flex;gap:8px;margin-bottom:0}
.mode-btn{flex:1;padding:16px 14px;border-radius:var(--radius);border:2px solid var(--bd);background:var(--wh);cursor:pointer;transition:all .2s;text-align:center;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:8px}
.mode-btn:hover{border-color:var(--gd);transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.mode-btn.active{border-color:var(--gd);background:var(--gl)}
.mode-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;letter-spacing:-.5px;color:#fff}
.mode-label{font-weight:700;font-size:14px;color:var(--tx)}
.mode-desc{font-size:11px;color:var(--mu);font-weight:400;line-height:1.3}
.mode-count{font-size:11px;color:var(--gd);font-weight:700;margin-top:2px}

/* Color & waste shared */
.color-row{display:flex;gap:14px;flex-wrap:wrap}
.color-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.color-btn{width:42px;height:42px;border-radius:50%;border:3px solid var(--bd);cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.color-btn:hover:not(.disabled){transform:scale(1.1)}
.color-btn.active{border-color:var(--gd);transform:scale(1.15);box-shadow:0 0 0 3px var(--gl),0 2px 8px rgba(0,0,0,.15)}
.color-btn.disabled{opacity:.25;cursor:not-allowed;transform:none !important}
.color-label{font-size:10px;color:var(--mu);font-weight:500;transition:all .2s}
.color-label.active{color:var(--gd);font-weight:700}
.color-label.disabled{opacity:.35}

.waste-group{display:flex;flex-direction:column;gap:8px}
.waste-btn{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--radius);background:var(--wh);border:2px solid var(--bd);cursor:pointer;transition:all .2s;text-align:left;box-shadow:var(--shadow)}
.waste-btn:hover:not(.disabled){border-color:var(--gd);transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.waste-btn.active{border-color:var(--gd);background:var(--gl)}
.waste-btn.disabled{opacity:.35;cursor:not-allowed;transform:none !important}
.waste-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.waste-icon svg{width:22px;height:22px}
.waste-label{font-weight:600;font-size:14px;color:var(--tx)}
.waste-color-name{font-size:11px;color:var(--mu);font-weight:400;margin-top:1px}
.waste-check{margin-left:auto;width:24px;height:24px;border-radius:6px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.waste-check.active{border:none;background:var(--gd)}

.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:10px 16px;border-radius:10px;border:2px solid var(--bd);background:var(--wh);color:var(--tx);font:500 13px/1 'Poppins',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.chip:hover{border-color:var(--gd);transform:translateY(-1px)}
.chip.active{border-color:var(--gd);background:var(--gl);font-weight:600}
.chip-price{font-size:10px;color:var(--mu);font-weight:400}

.toggle-group{display:flex;flex-direction:column;gap:8px}
.toggle{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:var(--radius);border:2px solid var(--bd);background:var(--wh);color:var(--tx);font:500 13px/1.3 'Poppins',sans-serif;cursor:pointer;transition:all .2s;width:100%;text-align:left;box-shadow:var(--shadow)}
.toggle:hover:not(.disabled){border-color:var(--gd);transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.toggle.active{border-color:var(--g);background:var(--gl)}
.toggle.disabled{opacity:.4;cursor:not-allowed;transform:none !important}
.toggle-icon-wrap{width:38px;height:38px;border-radius:10px;background:var(--off);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toggle-icon-wrap svg{width:20px;height:20px}
.toggle.active .toggle-icon-wrap{background:var(--gl)}
.toggle-label{flex:1;font-weight:600;font-size:13px}
.toggle-price{font-size:11px;color:var(--mu);font-weight:500}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.checkbox.active{border:none;background:var(--gd)}
.checkbox svg{width:12px;height:12px}

.summary{background:var(--wh);border:1px solid var(--bd);border-radius:var(--radius);padding:20px;margin-top:16px;box-shadow:var(--shadow);border-left:4px solid var(--gd)}
.summary-head{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gd);font-weight:700;margin-bottom:14px}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;color:var(--mu);border-bottom:1px solid var(--off);font-weight:500}
.summary-row span:last-child{font-weight:600;color:var(--tx)}
.summary-total{display:flex;justify-content:space-between;padding-top:16px;margin-top:10px;border-top:2px solid var(--gd);font-size:22px;font-weight:800;color:var(--gd)}
.summary-note{font-size:10px;color:var(--mu);margin-top:10px;font-weight:400}
.cta{width:100%;padding:16px;border-radius:12px;border:none;background:var(--gd);color:#fff;font:700 15px/1 'Poppins',sans-serif;cursor:pointer;margin-top:18px;letter-spacing:.5px;transition:all .25s;box-shadow:0 4px 12px rgba(0,104,71,.3)}
.cta:hover{background:#005538;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,104,71,.4)}
.cta:active{transform:translateY(0)}
.footer{text-align:center;font-size:10px;color:var(--mu);margin-top:24px;padding-bottom:24px;letter-spacing:1px;font-weight:500}
@media(min-width:900px){
  .layout{flex-direction:row;min-height:calc(100vh - 58px)}
  .viewer{flex:1 1 55%;position:sticky;top:58px;height:calc(100vh - 58px);max-height:none;display:flex;align-items:center;overflow:hidden;border-bottom:none;border-right:3px solid var(--gd)}
  .viewer img{width:100%;height:100%;object-fit:contain;background:#0a0a0a}
  .panel{flex:1 1 45%;max-width:520px;padding:32px 32px 48px;overflow-y:auto;max-height:calc(100vh - 58px)}
}
</style>
</head>

const COLORS_HEX={azul:'#1e3a6e',verde:'#1a8c3a',amarelo:'#e8b800',cinza:'#6B7280',bronze:'#8B6914'};
const WASTE_IC={papel:'ic-papel',vidro:'ic-vidro',embalagens:'ic-plastico',indiferenciados:'ic-lixo'};
const RING_CLR={papel:'#3b7dd8',vidro:'#22c55e',embalagens:'#eab308',indiferenciados:'#888'};
const OPT_IC={pilhao:'ic-pilhao',placa_cli:'ic-personalizacao',placa_res:'ic-papel',placa_est:'ic-lixo',tag_rfid:'ic-degrau'};
const ECO_DEFAULT=['papel','vidro','embalagens','indiferenciados'];
const ECO_BLOCKED_COLORS=['amarelo','verde'];
const POS_3={papel:22,vidro:50,embalagens:78};
const POS_4={papel:15,vidro:38,embalagens:62,indiferenciados:84};

let lang='pt', market='pt';
let state={mode:'eco',color:'residuo',wastes:[...ECO_DEFAULT],aro:'integrado',argola:'simples',opts:[]};

function t(){return T[lang]}
function isColorBlocked(c){return state.mode==='eco'&&ECO_BLOCKED_COLORS.includes(c)}
function icon(id,cls){return`<svg class="${cls||'ic'}"><use href="#${id}"/></svg>`}
function checkSvg(){return`<svg class="ic" style="width:14px;height:14px;stroke:#fff"><use href="#ic-check"/></svg>`}

function wastePrice(w){
  const tb=market==='pt'?PRICES:PRICES_INT;
  return tb[w]?.[state.aro]?.[state.argola]||0;
}
function optPrice(o){return market==='pt'?OPTIONALS[o].pt:OPTIONALS[o].intl}
function optTotal(){return state.opts.reduce((s,o)=>s+optPrice(o),0)}
function unitPriceFor(w){return wastePrice(w)+optTotal()}
function getTotal(){return state.wastes.reduce((s,w)=>s+unitPriceFor(w),0)}

function getImage(){
  const c=state.color,a=state.opts;
  if(a.includes('pilhao'))return{src:IMAGES.pilhao,layout:null};
  if(c==='residuo')return{src:IMAGES.sem,layout:'4'};
  if(c==='azul'&&state.argola==='dupla')return{src:IMAGES.azul_dupla,layout:'3'};
  if(c==='azul')return{src:IMAGES.azul_simples,layout:'3'};
  if(c==='bronze')return{src:IMAGES.bronze_simples,layout:'3'};
  if(c==='cinza')return{src:IMAGES.cinza_grupo,layout:'4'};
  return{src:IMAGES.sem,layout:'4'};
}

function buildSpotlight(layout,wastes){
  if(!layout)return'none';
  const posMap=layout==='3'?POS_3:POS_4;
  const selected=wastes.filter(w=>posMap[w]!=null).map(w=>posMap[w]);
  if(!selected.length)return'rgba(0,0,0,0.8)';
  if(selected.length>=Object.values(posMap).length)return'none';
  const rw=layout==='3'?20:18;
  const d=Math.min(0.82,(1-selected.length/Object.values(posMap).length)*0.9);
  if(d<0.1)return'none';
  return selected.map(p=>`radial-gradient(ellipse ${rw}% 75% at ${p}% 48%, transparent 0%, rgba(0,0,0,${d}) 100%)`).join(',');
}

function render(){
  const tr=t(),total=getTotal(),n=state.wastes.length;
  const img=getImage();

  // Lang + market
  let lh='';['pt','es','en','fr','de'].forEach(l=>{lh+=`<button class="lang-btn${lang===l?' active':''}" onclick="setLang('${l}')">${l.toUpperCase()}</button>`});
  document.getElementById('langSel').innerHTML=lh;
  document.getElementById('headerTitle').textContent=tr.title;
  document.getElementById('totalLabel').textContent=tr.total;
  document.getElementById('headerPrice').innerHTML=Math.round(total)+'<span>€</span>';
  document.getElementById('s0Label').textContent=tr.s0;
  document.getElementById('s0Sub').textContent=tr.s0sub;
  document.getElementById('s1Label').textContent=tr.s1;
  document.getElementById('s1Sub').textContent=tr.s1sub;
  document.getElementById('s2Label').textContent=tr.s2;
  document.getElementById('s2Sub').textContent=state.mode==='eco'?tr.s2sub_eco:tr.s2sub_ind;
  document.getElementById('s3Label').textContent=tr.s3;
  document.getElementById('s3Sub').textContent=tr.s3sub;
  document.getElementById('s4Label').textContent=tr.s4;
  document.getElementById('s4Sub').textContent=tr.s4sub;
  document.getElementById('sumHead').textContent=tr.sumHead;
  document.getElementById('sumTotalLabel').textContent=tr.sumTotal;
  document.getElementById('sumNote').textContent=tr.sumNote;
  document.getElementById('ctaBtn').textContent=tr.cta;

  // Mode
  let mh=`<button class="mode-btn${state.mode==='eco'?' active':''}" onclick="setMode('eco')"><div class="mode-icon" style="background:var(--gd)"><svg class="ic" style="width:26px;height:26px;stroke:#fff"><use href="#ic-ecoponto"/></svg></div><div class="mode-label">${tr.mode_eco}</div><div class="mode-desc">${tr.mode_eco_desc}</div><div class="mode-count">${tr.mode_eco_count}</div></button>`;
  mh+=`<button class="mode-btn${state.mode==='ind'?' active':''}" onclick="setMode('ind')"><div class="mode-icon" style="background:var(--s)"><svg class="ic" style="width:26px;height:26px;stroke:#fff"><use href="#ic-single"/></svg></div><div class="mode-label">${tr.mode_ind}</div><div class="mode-desc">${tr.mode_ind_desc}</div><div class="mode-count">${tr.mode_ind_count}</div></button>`;
  document.getElementById('modeGroup').innerHTML=mh;

  // Image + spotlight
  document.getElementById('productImg').src=img.src;
  const sp=document.getElementById('spotlight');
  if(img.layout){sp.style.background=buildSpotlight(img.layout,state.wastes);sp.style.display=''}else sp.style.display='none';

  // Badges
  let bh=`<span class="badge-glass">${tr.colors[state.color]}</span>`;
  state.wastes.forEach(w=>{bh+=`<span class="badge" style="background:${RING_CLR[w]||'#888'}dd">${tr.wasteTypes[w]}</span>`});
  bh+=`<span class="badge-glass">${tr.aros[state.aro]}</span>`;
  bh+=`<span class="badge-glass">${tr.argolas[state.argola]}</span>`;
  if(n>1)bh+=`<span class="badge-glass">×${n}</span>`;
  document.getElementById('badges').innerHTML=bh;

  // Colors
  let ch='';
  const selR=state.color==='residuo';
  ch+=`<div class="color-wrap"><button class="color-btn${selR?' active':''}" style="background:conic-gradient(#1e3a6e 0deg,#1a8c3a 90deg,#e8b800 180deg,#6B7280 270deg,#1e3a6e 360deg)" onclick="selectColor('residuo')" title="${tr.colorResiduo}"></button><span class="color-label${selR?' active':''}">${tr.colorResiduo}</span></div>`;
  Object.keys(COLORS_HEX).forEach(k=>{
    const sel=state.color===k,blocked=isColorBlocked(k);
    ch+=`<div class="color-wrap"><button class="color-btn${sel?' active':''}${blocked?' disabled':''}" style="background:${COLORS_HEX[k]}" onclick="${blocked?'':'selectColor(\''+k+'\')'}" title="${tr.colors[k]}${blocked?' ('+tr.unavail+')':''}"></button><span class="color-label${sel?' active':''}${blocked?' disabled':''}">${tr.colors[k]}</span></div>`;
  });
  document.getElementById('colorRow').innerHTML=ch;

  // Waste
  let wh='';
  ECO_DEFAULT.forEach(k=>{
    const sel=state.wastes.includes(k),rc=RING_CLR[k]||'#888',p=wastePrice(k);
    wh+=`<button class="waste-btn${sel?' active':''}" onclick="toggleWaste('${k}')">
      <div class="waste-icon" style="background:${rc}18;color:${rc}">${icon(WASTE_IC[k],'ic ic-lg')}</div>
      <div><div class="waste-label">${tr.wasteTypes[k]}</div><div class="waste-color-name">${p}€${tr.sumPerUnit}</div></div>
      <div class="waste-check${sel?' active':''}">${sel?checkSvg():''}</div></button>`;
  });
  document.getElementById('wasteGroup').innerHTML=wh;

  // Aro — new section (reuse s3 slot)
  let arh='';
  ['integrado','rotomoldado'].forEach(k=>{
    const sel=state.aro===k;
    arh+=`<button class="chip${sel?' active':''}" onclick="selectAro('${k}')" style="flex:1;flex-direction:column;align-items:flex-start;gap:2px;padding:14px 16px">
      <span style="font-weight:600">${tr.aros[k]}</span>
      <span style="font-size:10px;color:var(--mu);font-weight:400">${tr.aroDesc[k]}</span></button>`;
  });
  document.getElementById('ringGroup').innerHTML=arh;

  // Argola — reuse s4 slot
  let agh='';
  ['simples','dupla'].forEach(k=>{
    const sel=state.argola===k;
    agh+=`<button class="chip${sel?' active':''}" onclick="selectArgola('${k}')"><span>${tr.argolas[k]}</span></button>`;
  });
  document.getElementById('accGroup').innerHTML=agh;

  // Opcionais — need a new section. Hijack s5
  let s5el=document.getElementById('secOpt');
  if(!s5el){
    // Create dynamically on first render
    const panel=document.querySelector('.panel');
    const sum=document.querySelector('.summary');
    const div=document.createElement('div');
    div.className='section';div.id='secOpt';
    div.innerHTML=`<div class="section-label"><span class="section-num">05</span> <span id="s5Label"></span></div><div class="section-sub" id="s5Sub"></div><div class="toggle-group" id="optGroup"></div>`;
    panel.insertBefore(div,sum);
    s5el=div;
  }
  document.getElementById('s5Label').textContent=tr.s5;
  document.getElementById('s5Sub').textContent=tr.s5sub;

  let oh='';
  Object.keys(OPTIONALS).forEach(k=>{
    const sel=state.opts.includes(k),p=optPrice(k);
    oh+=`<button class="toggle${sel?' active':''}" onclick="toggleOpt('${k}')">
      <div class="toggle-icon-wrap" style="color:var(--gd)">${icon(OPT_IC[k]||'ic-degrau')}</div>
      <div class="toggle-label">${tr.optLabels[k]}</div>
      <span class="toggle-price">+${p<1?p.toFixed(2):p.toFixed(p%1?2:0)}€</span>
      <div class="checkbox${sel?' active':''}">${sel?checkSvg():''}</div></button>`;
  });
  document.getElementById('optGroup').innerHTML=oh;

  // Market toggle
  let mkt=document.getElementById('mktToggle');
  if(!mkt){
    const sum=document.querySelector('.summary');
    const div=document.createElement('div');
    div.id='mktToggle';div.style.cssText='display:flex;gap:6px;margin-bottom:12px';
    sum.parentNode.insertBefore(div,sum);
  }
  mkt=document.getElementById('mktToggle');
  mkt.innerHTML=`<button class="chip${market==='pt'?' active':''}" onclick="setMarket('pt')" style="flex:1;justify-content:center">🇵🇹 ${tr.pt_label}</button><button class="chip${market==='intl'?' active':''}" onclick="setMarket('intl')" style="flex:1;justify-content:center">🌍 ${tr.intl_label}</button>`;

  // Summary — per waste type
  let sh='';
  state.wastes.forEach(w=>{
    const p=wastePrice(w);
    sh+=`<div class="summary-row"><span>${tr.wasteTypes[w]}</span><span>${p}€</span></div>`;
  });
  if(state.opts.length){
    const oTotal=optTotal();
    sh+=`<div class="summary-row"><span>${tr.accs} ×${n}</span><span>+${(oTotal*n).toFixed(2)}€</span></div>`;
  }
  document.getElementById('summaryRows').innerHTML=sh;
  document.getElementById('summaryTotal').textContent=Math.round(total*100)/100+'€';
}

function setLang(l){lang=l;document.documentElement.lang=l;render()}
function setMarket(m){market=m;render()}
function setMode(m){state.mode=m;if(m==='eco'){state.wastes=[...ECO_DEFAULT];if(ECO_BLOCKED_COLORS.includes(state.color))state.color='residuo'}else{state.wastes=state.wastes.length?[state.wastes[0]]:['papel']}render()}
function selectColor(c){if(isColorBlocked(c))return;state.color=c;render()}
function selectAro(a){state.aro=a;render()}
function selectArgola(a){state.argola=a;render()}
function toggleWaste(w){if(state.mode==='ind'){state.wastes=[w];render();return}const i=state.wastes.indexOf(w);if(i>=0){if(state.wastes.length>1)state.wastes.splice(i,1)}else state.wastes.push(w);render()}
function toggleOpt(o){const i=state.opts.indexOf(o);if(i>=0)state.opts.splice(i,1);else state.opts.push(o);render()}

document.getElementById('ctaBtn').addEventListener('click',()=>{
  const tr=t(),n=state.wastes.length;
  const lines=[
    (state.mode==='eco'?tr.mode_eco:tr.mode_ind)+' (×'+n+')',
    tr.color+': '+tr.colors[state.color],
    tr.waste+': '+state.wastes.map(w=>tr.wasteTypes[w]+' ('+wastePrice(w)+'€)').join(', '),
    tr.aro+': '+tr.aros[state.aro],
    tr.ring+': '+tr.argolas[state.argola],
    tr.accs+': '+(state.opts.length?state.opts.map(o=>tr.optLabels[o]).join(', '):tr.none),
    '',tr.sumTotal+': '+Math.round(getTotal()*100)/100+'€ ('+(market==='pt'?tr.pt_label:tr.intl_label)+')',
  ].join('\n');
  alert(tr.alertTitle+'\n\n'+lines);
});

render();
</script>
</body>
